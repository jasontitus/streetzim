<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offline Map</title>
    <link rel="stylesheet" href="leaflet.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; background: #f2efe9; }
        .map-info {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(255,255,255,0.85);
            padding: 4px 8px;
            border-radius: 4px;
            font: 11px/1.4 sans-serif;
            color: #333;
            z-index: 1000;
            pointer-events: none;
        }
        .leaflet-control-attribution {
            font-size: 10px !important;
        }
        #layer-toggle {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: #fff; border: none; border-radius: 4px;
            padding: 6px 12px; font-size: 13px; cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
            font-family: sans-serif;
            display: none;
        }
        #layer-toggle:hover { background: #f0f0f0; }
        #layer-toggle.satellite-active { background: #1a73e8; color: #fff; }
        #layer-toggle.satellite-active:hover { background: #1557b0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id="layer-toggle" title="Toggle satellite imagery">Satellite</button>
    <div class="map-info" id="info"></div>
    <script src="leaflet.js"></script>
    <script>
    (function() {
        // Compute base URL for absolute resource paths (needed for Kiwix JS PWA)
        var baseUrl = (function() {
            var href = window.location.href;
            return href.substring(0, href.lastIndexOf('/') + 1);
        })();

        // Debug logging — enable with ?debug=1. Keeps a ring buffer so we
        // can surface fetch failures even when the WebView has no console.
        var DEBUG = /[?&]debug=1/.test(window.location.search);
        var _debugLog = [];
        function dbg() {
            var args = Array.prototype.slice.call(arguments);
            var line = args.map(function(a) {
                if (a instanceof Error) return (a.name || 'Error') + ': ' + a.message;
                if (typeof a === 'object') {
                    try { return JSON.stringify(a); } catch (e) { return String(a); }
                }
                return String(a);
            }).join(' ');
            _debugLog.push('[' + new Date().toISOString().substr(11, 12) + '] ' + line);
            if (_debugLog.length > 200) _debugLog.shift();
            if (window.console && console.log) console.log.apply(console, ['[streetzim]'].concat(args));
        }
        function describeError(err) {
            if (!err) return 'unknown error';
            var parts = [];
            if (err.name) parts.push(err.name);
            if (err.message) parts.push(err.message);
            if (err.code) parts.push('code=' + err.code);
            return parts.join(': ') || String(err);
        }
        dbg('boot', { href: window.location.href, baseUrl: baseUrl, ua: navigator.userAgent });

        // Load map configuration with retry — on Windows kiwix-desktop the
        // first request after opening a large ZIM can fail before the
        // internal server is fully up.
        function fetchConfig(n) {
            var url = baseUrl + 'map-config.json';
            dbg('fetch map-config.json', 'attempt', n, url);
            return fetch(url)
                .then(function(r) {
                    dbg('map-config.json response', r.status, r.statusText, 'type=' + r.type);
                    if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + r.statusText);
                    return r.json();
                })
                .catch(function(err) {
                    dbg('map-config.json fetch failed', 'attempt', n, describeError(err));
                    if (n < 4) {
                        return new Promise(function(resolve) {
                            setTimeout(function() { resolve(fetchConfig(n + 1)); }, 400 * n);
                        });
                    }
                    err._url = url;
                    throw err;
                });
        }
        fetchConfig(1)
            .then(function(config) { initMap(config); })
            .catch(function(err) {
                dbg('fatal error loading map config', describeError(err), err && err.stack);
                var info = document.getElementById('info');
                if (info) {
                    info.innerHTML = '<strong>Error loading map config</strong><br>' +
                        describeError(err) +
                        '<br><span style="font-size:9px;opacity:0.75;">URL: ' + (err && err._url ? err._url : (baseUrl + 'map-config.json')) + '</span>' +
                        '<br><span style="font-size:9px;opacity:0.75;">Base: ' + baseUrl + '</span>' +
                        '<br><span style="font-size:9px;opacity:0.75;">UA: ' + (navigator.userAgent || '?').substring(0, 80) + '</span>' +
                        '<br><a href="#" id="debug-show" style="font-size:10px;color:#1a73e8;">Show debug log</a>';
                    info.style.pointerEvents = 'auto';
                    info.style.maxWidth = '420px';
                    var link = document.getElementById('debug-show');
                    if (link) {
                        link.addEventListener('click', function(e) {
                            e.preventDefault();
                            var pre = document.createElement('pre');
                            pre.style.cssText = 'max-height:220px;overflow:auto;font-size:9px;background:#fff;padding:6px;margin-top:6px;border:1px solid #ddd;white-space:pre-wrap;word-break:break-all;';
                            pre.textContent = _debugLog.join('\n') || '(empty)';
                            info.appendChild(pre);
                            link.style.display = 'none';
                        });
                    }
                }
                initMap({ center: [0, 0], zoom: 2, name: 'Offline Map' });
            });

        function initMap(config) {
            var center = config.center || [0, 0];
            var zoom = config.zoom || 10;
            var minZoom = config.minZoom || 0;
            var nativeMaxZoom = config.maxZoom || 14;

            // Leaflet uses [lat, lng] not [lng, lat]
            var map = L.map('map', {
                center: [center[1], center[0]],
                zoom: zoom,
                minZoom: minZoom,
                maxZoom: 19,
                zoomControl: true,
                attributionControl: true
            });

            // Constrain to bounds if available
            if (config.bounds) {
                var b = config.bounds; // [minlon, minlat, maxlon, maxlat]
                var bounds = L.latLngBounds(
                    L.latLng(b[1], b[0]),
                    L.latLng(b[3], b[2])
                );
                map.setMaxBounds(bounds.pad(0.1));
            }

            // Add offline tile layer with absolute URLs
            // Tiles are 512x512 (2x retina), so use tileSize: 512 and
            // zoomOffset: -1 to map Leaflet's zoom levels correctly.
            // maxNativeZoom = highest zoom with actual tiles
            // maxZoom = 19 allows over-zooming (Leaflet scales up the tiles)
            L.tileLayer(baseUrl + 'tiles/{z}/{x}/{y}.png', {
                minZoom: minZoom,
                maxNativeZoom: nativeMaxZoom,
                maxZoom: 19,
                tileSize: 512,
                zoomOffset: -1,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors | <a href="https://openmaptiles.org/">OpenMapTiles</a>',
                errorTileUrl: ''
            }).addTo(map);

            // Add scale control
            L.control.scale({ imperial: true, metric: true }).addTo(map);

            // Satellite layer toggle
            if (config.hasSatellite) {
                var satMaxZoom = config.satelliteMaxZoom || nativeMaxZoom;
                var satExt = config.satelliteFormat || 'webp';
                var satTileSize = config.satelliteTileSize || 256;
                var satelliteLayer = L.tileLayer(baseUrl + 'satellite/{z}/{x}/{y}.' + satExt, {
                    minZoom: minZoom,
                    maxNativeZoom: satMaxZoom,
                    maxZoom: 19,
                    tileSize: satTileSize,
                    zoomOffset: satTileSize === 512 ? -1 : 0,
                    attribution: '&copy; <a href="https://s2maps.eu">Sentinel-2 Cloudless</a> by EOX (Contains modified Copernicus Sentinel data 2021)'
                });

                var toggleBtn = document.getElementById('layer-toggle');
                toggleBtn.style.display = 'block';
                var satelliteVisible = false;

                toggleBtn.addEventListener('click', function() {
                    satelliteVisible = !satelliteVisible;
                    toggleBtn.classList.toggle('satellite-active', satelliteVisible);
                    toggleBtn.textContent = satelliteVisible ? 'Map' : 'Satellite';

                    if (satelliteVisible) {
                        satelliteLayer.addTo(map);
                        satelliteLayer.bringToBack();
                    } else {
                        map.removeLayer(satelliteLayer);
                    }
                });
            }

            // Show info
            var info = document.getElementById('info');
            info.textContent = config.name || 'Offline Map';

            // Update title
            document.title = config.name || 'Offline Map';
        }
    })();
    </script>
</body>
</html>
